<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PadelTime">
  <title>PadelTime</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: #080814;
      color: #fff;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      touch-action: manipulation;
      overflow: hidden;
    }

    /* ══ SETUP ══ */
    #setup {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      gap: 1.2rem;
      background: radial-gradient(ellipse at top, #1a1a3e 0%, #080814 70%);
    }

    #team-inputs { margin-top: 1rem; display: flex; flex-direction: column; align-items: center; gap: 0.8rem; width: 100%; }

    .logo { font-size: 3rem; line-height: 1; }

    #setup h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #38bdf8, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle { color: #4a4a6a; font-size: 0.85rem; }

    .input-group { width: 100%; max-width: 300px; }

    .input-group label {
      display: block;
      margin-bottom: 0.35rem;
      color: #555;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
    }

    .input-group input {
      width: 100%;
      padding: 0.85rem 1rem;
      background: #12122a;
      border: 1.5px solid #2a2a4a;
      border-radius: 14px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      outline: none;
      transition: border-color .2s;
    }
    .input-group input:focus { border-color: #38bdf8; }
    .input-group input::placeholder { color: #2a2a4a; }

    .btn-start {
      background: linear-gradient(135deg, #38bdf8, #34d399);
      color: #000;
      border: none;
      padding: 1rem 2.5rem;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      margin-top: 0.3rem;
      box-shadow: 0 4px 24px rgba(56,189,248,.35);
      transition: transform .1s;
    }
    .btn-start:active { transform: scale(.96); }

    /* ══ STANDINGS ══ */
    #standings {
      display: none;
      flex-direction: column;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      background: radial-gradient(ellipse at top, #1a1a3e 0%, #080814 70%);
    }

    .st-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.2rem 0.6rem;
      border-bottom: 1px solid #1a1a30;
    }

    .st-topbar-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.1rem;
      font-weight: 800;
      background: linear-gradient(135deg, #38bdf8, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-icon {
      background: #1a1a30;
      border: none;
      color: #666;
      width: 36px; height: 36px;
      border-radius: 10px;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-icon:active { background: #252545; }

    .st-body {
      flex: 1;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
      overflow-y: auto;
      padding-bottom: max(1.2rem, env(safe-area-inset-bottom));
    }

    .section-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: #333;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
    }

    /* standings table */
    .st-table {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .st-row {
      display: flex;
      align-items: center;
      background: #0e0e24;
      border: 1px solid #1a1a30;
      border-radius: 14px;
      padding: 0.8rem 1rem;
      gap: 0.8rem;
      transition: border-color .2s;
    }
    .st-row.leader { border-color: #34d399; }

    .st-rank {
      font-size: 0.75rem;
      font-weight: 800;
      color: #333;
      width: 16px;
      text-align: center;
      flex-shrink: 0;
    }
    .st-row.leader .st-rank { color: #34d399; }

    .st-name {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 700;
      color: #ccc;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .st-row.leader .st-name { color: #fff; }

    .st-wins {
      font-size: 1.6rem;
      font-weight: 900;
      color: #e0e0e0;
      min-width: 32px;
      text-align: center;
    }
    .st-row.leader .st-wins { color: #34d399; }

    .st-win-label {
      font-size: 0.6rem;
      color: #333;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 0.15rem;
    }

    .st-counter {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
    }

    .st-btns {
      display: flex;
      gap: 0.4rem;
    }

    .btn-win {
      width: 38px; height: 38px;
      border-radius: 10px;
      border: none;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .1s;
    }
    .btn-win:active { transform: scale(.9); }
    .btn-win.plus   { background: #1a3a2a; color: #34d399; }
    .btn-win.minus  { background: #1a1a30; color: #444; }
    .btn-win.minus:active  { color: #888; }
    .btn-win.remove { background: #1a1a30; color: #2a2a4a; font-size: 1rem; }
    .btn-win.remove:active { background: #2a1a1a; color: #f87171; }

    /* matchup buttons */
    .st-matches {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .matchup-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-matchup {
      flex: 1;
      background: #0e0e24;
      border: 1px solid #2a2a4a;
      border-radius: 14px;
      color: #aaa;
      padding: 0.9rem 1rem;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      transition: border-color .15s, color .15s;
    }
    .btn-matchup:active { border-color: #38bdf8; color: #fff; }
    .btn-matchup-icon { font-size: 1rem; flex-shrink: 0; }

    .btn-matchup-del {
      flex-shrink: 0;
      width: 36px; height: 36px;
      background: #1a1a30;
      border: none;
      border-radius: 10px;
      color: #2a2a4a;
      font-size: 1rem;
      cursor: pointer;
      transition: background .1s, color .1s;
    }
    .btn-matchup-del:active { background: #2a1a1a; color: #f87171; }

    /* setup dynamic inputs */
    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
      width: 100%;
      max-width: 300px;
    }
    .input-row .input-group { flex: 1; margin: 0; }

    .btn-remove-input {
      flex-shrink: 0;
      width: 38px; height: 46px;
      background: #1a1a30;
      border: none;
      border-radius: 12px;
      color: #444;
      font-size: 1.1rem;
      cursor: pointer;
      margin-bottom: 0;
      transition: color .15s, background .15s;
    }
    .btn-remove-input:active { color: #f87171; background: #2a1a1a; }

    .btn-add-input {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%; max-width: 300px;
      background: #0e0e24;
      border: 1.5px dashed #2a2a4a;
      border-radius: 14px;
      color: #38bdf8;
      padding: 0.8rem;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .btn-add-input:active { border-color: #38bdf8; background: #0c0c28; }

    .btn-reset-tour {
      background: none;
      border: 1px solid #1a1a30;
      border-radius: 12px;
      color: #333;
      padding: 0.7rem;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    .btn-reset-tour:active { color: #888; border-color: #333; }

    .btn-players-mode {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%; max-width: 300px;
      background: #0e0e24;
      border: 1.5px solid #2a2a4a;
      border-radius: 14px;
      color: #aaa;
      padding: 0.85rem;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .btn-players-mode:active { border-color: #38bdf8; color: #fff; }

    .setup-divider {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      width: 100%; max-width: 300px;
    }
    .setup-divider-line { flex: 1; height: 1px; background: #1a1a30; }
    .setup-divider-text { color: #2a2a4a; font-size: 0.72rem; font-weight: 600; }

    /* ══ PLAYERS ══ */
    #players {
      display: none;
      flex-direction: column;
      height: 100vh;
      height: -webkit-fill-available;
      background: radial-gradient(ellipse at top, #1a1a3e 0%, #080814 70%);
    }

    .players-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.2rem 0.6rem;
      border-bottom: 1px solid #1a1a30;
      flex-shrink: 0;
    }

    .players-body {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.2rem;
      gap: 0.8rem;
      padding-bottom: max(1.2rem, env(safe-area-inset-bottom));
    }

    .players-inner {
      width: 100%; max-width: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
    }

    #player-inputs {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
    }

    .btn-shuffle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%; max-width: 300px;
      background: #0e0e24;
      border: 1.5px solid #2a2a4a;
      border-radius: 14px;
      color: #38bdf8;
      padding: 0.85rem;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .btn-shuffle:active { border-color: #38bdf8; background: #0c0c28; }

    #assignment-result {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .pair-card {
      width: 100%;
      background: #0e0e24;
      border: 1.5px solid #1a1a30;
      border-radius: 14px;
      padding: 0.8rem 1rem;
    }
    .pair-card.pair-active { border-color: #2a4060; background: #0a1020; }

    .pair-label {
      font-size: 0.62rem;
      font-weight: 700;
      color: #333;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 0.3rem;
    }

    .pair-players {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .pair-player {
      font-size: 0.95rem;
      font-weight: 700;
      color: #ccc;
    }
    .pair-card.pair-active .pair-player { color: #e0e0e0; }

    .pair-amp {
      font-size: 0.7rem;
      color: #2a2a4a;
      font-weight: 600;
    }

    .first-match-box {
      width: 100%;
      background: #081828;
      border: 1.5px solid #38bdf8;
      border-radius: 16px;
      padding: 1rem 1.1rem;
    }

    .first-match-header {
      font-size: 0.62rem;
      font-weight: 700;
      color: #38bdf8;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.7rem;
    }

    .first-match-vs {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .fm-team { flex: 1; display: flex; flex-direction: column; gap: 0.15rem; }

    .fm-pair-num {
      font-size: 0.6rem;
      font-weight: 700;
      color: #38bdf8;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .fm-names {
      font-size: 0.88rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.35;
    }

    .fm-serve-badge {
      display: inline-block;
      background: linear-gradient(135deg, #38bdf8, #34d399);
      color: #000;
      font-size: 0.58rem;
      font-weight: 800;
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      margin-top: 0.25rem;
      width: fit-content;
      letter-spacing: 0.05em;
    }

    .fm-vs {
      font-size: 0.7rem;
      font-weight: 900;
      color: #1a3a5a;
      letter-spacing: 0.1em;
      flex-shrink: 0;
    }

    .fm-waiting {
      margin-top: 0.65rem;
      padding-top: 0.55rem;
      border-top: 1px solid #0e2a40;
      font-size: 0.7rem;
      color: #2a4a6a;
      font-weight: 600;
    }

    /* ══ GAME ══ */
    #game {
      display: none;
      flex-direction: column;
      height: 100vh;
      height: -webkit-fill-available;
    }

    .game-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0c0c20;
      border-bottom: 1px solid #1a1a30;
      padding: 0.6rem 1.2rem;
      gap: 0.5rem;
    }

    .game-bar-team {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 1;
    }
    .game-bar-team.right { justify-content: flex-end; }

    .gbar-name {
      font-size: 0.8rem;
      font-weight: 700;
      color: #666;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100px;
    }

    .gbar-games {
      font-size: 1.4rem;
      font-weight: 900;
      color: #e0e0e0;
      min-width: 24px;
      text-align: center;
    }

    .gbar-label {
      font-size: 0.55rem;
      font-weight: 700;
      color: #2a2a4a;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-align: center;
      flex-shrink: 0;
    }

    .court { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .team-card {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.25rem;
      cursor: pointer; user-select: none;
      transition: background .08s;
    }
    .team-card:active { background: rgba(255,255,255,.04); }
    .team-card.t0 { background: linear-gradient(180deg, #0c0c20 0%, #080814 100%); }
    .team-card.t1 { background: linear-gradient(180deg, #080814 0%, #0c0c20 100%); }

    .court-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #2a2a4a, transparent);
      flex-shrink: 0;
    }

    .card-label {
      font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-top: 1rem;
    }
    .t0 .card-label { color: #38bdf8; }
    .t1 .card-label { color: #f87171; }

    .card-points {
      font-size: 6rem; font-weight: 900;
      line-height: 1; letter-spacing: -0.04em;
      margin-top: 0.5rem;
    }
    .t0 .card-points { color: #38bdf8; }
    .t1 .card-points { color: #f87171; }

    .card-tb {
      display: none;
      background: #ef4444; color: #fff;
      font-size: 0.65rem; font-weight: 800;
      letter-spacing: 0.1em;
      padding: .2rem .5rem; border-radius: 4px;
    }

    .controls {
      display: flex; gap: 0.5rem;
      padding: 0.75rem 1rem;
      background: #0c0c20;
      border-top: 1px solid #1a1a30;
      padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
    }

    .btn-ctrl {
      flex: 1;
      background: #1a1a30; border: none;
      color: #888;
      padding: 0.7rem 0.2rem;
      border-radius: 10px;
      font-size: 0.75rem; font-weight: 600;
      cursor: pointer; white-space: nowrap;
      transition: background .1s, color .1s;
    }
    .btn-ctrl:active { background: #252545; color: #ccc; }
    .btn-ctrl.back { color: #38bdf8; }

    /* ══ MODALS ══ */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(4,4,16,.92);
      flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 60;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: 2rem;
    }

    .modal-box {
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      padding: 1.6rem 1.4rem;
      width: 100%; max-width: 320px;
      display: flex; flex-direction: column; gap: 1rem;
    }

    .modal-title { font-size: 1rem; font-weight: 800; color: #ccc; }

    .modal-field { display: flex; flex-direction: column; }

    .modal-input-label {
      font-size: 0.7rem; color: #444;
      text-transform: uppercase; letter-spacing: 0.1em;
      font-weight: 600; margin-bottom: 0.3rem;
    }

    .modal-input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: #0c0c20;
      border: 1.5px solid #2a2a4a; border-radius: 12px;
      color: #fff; font-size: 0.95rem; font-weight: 600;
      outline: none; transition: border-color .2s;
    }
    .modal-input:focus { border-color: #38bdf8; }
    .modal-input::placeholder { color: #2a2a4a; }

    .modal-actions { display: flex; gap: 0.6rem; }

    .btn-modal-cancel {
      flex: 1; background: #1a1a30; border: none;
      color: #666; padding: 0.8rem; border-radius: 12px;
      font-size: 0.85rem; font-weight: 700; cursor: pointer;
    }
    .btn-modal-cancel:active { opacity: .7; }

    .btn-modal-ok {
      flex: 2;
      background: linear-gradient(135deg, #38bdf8, #34d399);
      border: none; color: #000;
      padding: 0.8rem; border-radius: 12px;
      font-size: 0.85rem; font-weight: 800; cursor: pointer;
    }
    .btn-modal-ok:active { opacity: .85; }

    /* ══ WINNER ══ */
    #overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(4,4,16,.95);
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1rem; z-index: 50;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .ov-trophy { font-size: 5rem; line-height: 1; animation: pop .6s ease; }

    @keyframes pop {
      0%   { transform: scale(.3); opacity: 0; }
      70%  { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }

    .ov-title {
      font-size: .8rem; font-weight: 700;
      letter-spacing: .15em; text-transform: uppercase; color: #555;
    }

    #ov-winner {
      font-size: 2.2rem; font-weight: 900;
      letter-spacing: -.02em;
      background: linear-gradient(135deg, #fbbf24, #f87171);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center; padding: 0 1.5rem;
    }

    .ov-sets { font-size: .85rem; color: #444; font-weight: 600; }

    .ov-actions {
      display: flex; flex-direction: column;
      align-items: center; gap: 0.6rem;
      margin-top: 0.5rem; width: 100%; padding: 0 2rem;
    }

    .btn-award {
      background: linear-gradient(135deg, #34d399, #38bdf8);
      color: #000; border: none;
      padding: .85rem 2rem; border-radius: 50px;
      font-size: .9rem; font-weight: 800; cursor: pointer;
      width: 100%; max-width: 280px;
      box-shadow: 0 4px 20px rgba(52,211,153,.3);
    }
    .btn-award:active { opacity: .85; }

    .btn-new {
      background: #1a1a30;
      color: #666; border: none;
      padding: .75rem 2rem; border-radius: 50px;
      font-size: .85rem; font-weight: 700; cursor: pointer;
      width: 100%; max-width: 280px;
    }
    .btn-new:active { color: #aaa; }

  </style>
</head>
<body>

<!-- ══ SETUP ══ -->
<div id="setup">
  <div class="logo">🎾</div>
  <h1>PadelTime</h1>
  <p class="subtitle">Agrega las parejas</p>

  <div id="team-inputs"></div>

  <button class="btn-add-input" onclick="addTeamInput('')">＋ Agregar pareja</button>
  <button class="btn-start" onclick="startTourney()">Empezar Torneo</button>

  <div class="setup-divider">
    <div class="setup-divider-line"></div>
    <div class="setup-divider-text">o bien</div>
    <div class="setup-divider-line"></div>
  </div>
  <button class="btn-players-mode" onclick="goToPlayers()">👥 Sortear por integrantes</button>
</div>

<!-- ══ PLAYERS ══ -->
<div id="players">
  <div class="players-topbar">
    <button class="btn-icon" onclick="goToSetupFromPlayers()">←</button>
    <div class="st-topbar-title">👥 Integrantes</div>
    <div style="width:36px"></div>
  </div>
  <div class="players-body">
    <div class="players-inner">
      <div id="player-inputs"></div>
      <button class="btn-add-input" onclick="addPlayerInput('')">＋ Agregar jugador</button>
      <button class="btn-shuffle" onclick="shufflePairs()">🔀 Sortear parejas</button>
      <div id="assignment-result"></div>
      <button class="btn-start" id="btn-start-players" style="display:none" onclick="startFromPlayers()">🎾 Empezar Torneo</button>
    </div>
  </div>
</div>

<!-- ══ STANDINGS ══ -->
<div id="standings">
  <div class="st-topbar">
    <button class="btn-icon" onclick="goToSetup()" title="Volver">←</button>
    <div class="st-topbar-title">🎾 PadelTime</div>
    <button class="btn-icon" onclick="openTourneyRename()" title="Renombrar equipos">✏️</button>
  </div>

  <div class="st-body">
    <div>
      <div class="section-label">Posiciones</div>
      <div class="st-table" id="st-table"></div>
    </div>

    <div>
      <div class="section-label">Jugar partido</div>
      <div class="st-matches" id="st-matches"></div>
    </div>

    <button class="btn-reset-tour" onclick="confirmResetTour()">↺ Reiniciar torneo</button>
  </div>
</div>

<!-- ══ GAME ══ -->
<div id="game">
  <div class="game-bar">
    <div class="game-bar-team" id="gbar0">
      <span class="gbar-name" id="gb-name0"></span>
      <span class="gbar-games" id="gb-games0">0</span>
    </div>
    <div class="gbar-label">juegos</div>
    <div class="game-bar-team right" id="gbar1">
      <span class="gbar-games" id="gb-games1">0</span>
      <span class="gbar-name" id="gb-name1"></span>
    </div>
  </div>

  <div class="court">
    <div class="team-card t0" onclick="addPoint(0)">
      <div class="card-tb" id="tb0">TIEBREAK</div>
      <div class="card-label" id="lbl0">PAREJA 1</div>
      <div class="card-points" id="pts0">0</div>
    </div>
    <div class="court-divider"></div>
    <div class="team-card t1" onclick="addPoint(1)">
      <div class="card-tb" id="tb1">TIEBREAK</div>
      <div class="card-label" id="lbl1">PAREJA 2</div>
      <div class="card-points" id="pts1">0</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-ctrl back" onclick="goToStandings()">← Pos.</button>
    <button class="btn-ctrl" onclick="undo()">↩ Deshacer</button>
    <button class="btn-ctrl" onclick="openRename()">✏️ Editar</button>
    <button class="btn-ctrl" onclick="confirmReset()">↺ Reset</button>
  </div>
</div>

<!-- RENAME MATCH MODAL -->
<div class="modal-backdrop" id="modal-rename">
  <div class="modal-box">
    <div class="modal-title">Cambiar nombres</div>
    <div class="modal-field">
      <div class="modal-input-label">Pareja 1</div>
      <input class="modal-input" id="rn0" type="text" maxlength="18" autocomplete="off">
    </div>
    <div class="modal-field">
      <div class="modal-input-label">Pareja 2</div>
      <input class="modal-input" id="rn1" type="text" maxlength="18" autocomplete="off">
    </div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeRename()">Cancelar</button>
      <button class="btn-modal-ok" onclick="applyRename()">Guardar</button>
    </div>
  </div>
</div>


<!-- RENAME TOURNEY MODAL (inputs generados por JS) -->
<div class="modal-backdrop" id="modal-trename">
  <div class="modal-box">
    <div class="modal-title">Renombrar parejas</div>
    <div id="trename-fields"></div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeTourneyRename()">Cancelar</button>
      <button class="btn-modal-ok" onclick="applyTourneyRename()">Guardar</button>
    </div>
  </div>
</div>


<!-- WINNER -->
<div id="overlay">
  <div class="ov-trophy">🏆</div>
  <div class="ov-title">¡Ganador del partido!</div>
  <div id="ov-winner"></div>
  <div class="ov-sets" id="ov-sets"></div>
  <div class="ov-actions">
    <button class="btn-award" onclick="goToStandings()">Ver posiciones</button>
    <button class="btn-new" onclick="playAgain()">Repetir partido</button>
  </div>
</div>

<script>
'use strict';

/* ══ TOURNEY STATE ══ */
let T = { names: ['','',''], wins: [0,0,0], hiddenPairs: new Set() };
let matchTourIdx = [-1, -1]; // which tourney indices are playing

/* ══ MATCH STATE ══ */
const PTS = ['0','15','30','40'];
let s = {}, hist = [];

function mkState(names) {
  return {
    names,
    games: [0,0], pts: [0,0],
    deuce: false, adv: -1, golden: false,
    over: false, winner: -1
  };
}

/* ══ SETUP — inputs dinámicos ══ */
const PLACEHOLDERS = ['Los Tigres','Las Panteras','Los Osos','Los Leones','Los Águilas'];

function addTeamInput(value) {
  const container = document.getElementById('team-inputs');
  const n = container.children.length + 1;
  const ph = PLACEHOLDERS[n - 1] || 'Pareja ' + n;
  const row = document.createElement('div');
  row.className = 'input-row';
  row.innerHTML = `
    <div class="input-group">
      <label>Pareja ${n}</label>
      <input type="text" class="team-input" placeholder="${ph}" maxlength="18" autocomplete="off">
    </div>
    <button class="btn-remove-input" onclick="removeTeamInput(this)">×</button>`;
  if (value) row.querySelector('.team-input').value = value;
  container.appendChild(row);
  updateRemoveButtons();
}

function removeTeamInput(btn) {
  const container = document.getElementById('team-inputs');
  if (container.children.length <= 2) return;
  btn.closest('.input-row').remove();
  Array.from(container.querySelectorAll('label')).forEach((lbl, i) => {
    lbl.textContent = 'Pareja ' + (i + 1);
  });
  updateRemoveButtons();
}

function updateRemoveButtons() {
  const container = document.getElementById('team-inputs');
  const show = container.children.length > 2;
  container.querySelectorAll('.btn-remove-input').forEach(b => {
    b.style.visibility = show ? 'visible' : 'hidden';
  });
}

/* ══ SETUP → STANDINGS ══ */
function startTourney() {
  const inputs = document.querySelectorAll('.team-input');
  const prevNames = T.names.slice();
  const prevWins  = T.wins.slice();
  T.names = [];
  T.wins  = [];
  T.hiddenPairs = new Set();
  inputs.forEach((inp, i) => {
    const name = inp.value.trim() || 'Pareja ' + (i + 1);
    const existing = prevNames.indexOf(name);
    T.names.push(name);
    T.wins.push(existing >= 0 ? prevWins[existing] : 0);
  });
  show('standings');
  renderStandings();
}

function goToSetup() {
  const container = document.getElementById('team-inputs');
  container.innerHTML = '';
  T.names.forEach(name => addTeamInput(name));
  show('setup');
}

// inicializar 3 inputs al cargar
(function init() {
  addTeamInput(''); addTeamInput(''); addTeamInput('');
})();

/* ══ STANDINGS ══ */
function renderStandings() {
  // sort by wins desc, keep original index
  const order = Array.from({length: T.names.length}, (_,i) => i).sort((a,b) => T.wins[b] - T.wins[a]);

  const tbl = document.getElementById('st-table');
  tbl.innerHTML = '';
  order.forEach((ti, rank) => {
    const isLeader = rank === 0 && T.wins[ti] > 0;
    const row = document.createElement('div');
    row.className = 'st-row' + (isLeader ? ' leader' : '');
    row.innerHTML = `
      <div class="st-rank">${rank+1}</div>
      <div class="st-name">${esc(T.names[ti])}</div>
      <div class="st-counter">
        <div class="st-wins">${T.wins[ti]}</div>
        <div class="st-win-label">victorias</div>
      </div>
      <div class="st-btns">
        <button class="btn-win minus" onclick="changeWin(${ti},-1)">−</button>
        <button class="btn-win plus"  onclick="changeWin(${ti}, 1)">+</button>
        <button class="btn-win remove" onclick="removeTeam(${ti})">×</button>
      </div>`;
    tbl.appendChild(row);
  });

  // matchup buttons — all pairs dynamically
  const mtch = document.getElementById('st-matches');
  mtch.innerHTML = '';
  const n = T.names.length;
  for (let a = 0; a < n; a++) {
    for (let b = a + 1; b < n; b++) {
      const key = a + '-' + b;
      if (T.hiddenPairs.has(key)) continue;
      const row = document.createElement('div');
      row.className = 'matchup-row';
      const btn = document.createElement('button');
      btn.className = 'btn-matchup';
      btn.innerHTML = `<span class="btn-matchup-icon">🎾</span>${esc(T.names[a])} vs ${esc(T.names[b])}`;
      btn.onclick = ((ia, ib) => () => playMatch(ia, ib))(a, b);
      const del = document.createElement('button');
      del.className = 'btn-matchup-del';
      del.textContent = '×';
      del.onclick = ((k) => () => { T.hiddenPairs.add(k); renderStandings(); })(key);
      row.appendChild(btn);
      row.appendChild(del);
      mtch.appendChild(row);
    }
  }
}

function changeWin(ti, delta) {
  T.wins[ti] = Math.max(0, T.wins[ti] + delta);
  renderStandings();
}

function removeTeam(ti) {
  if (T.names.length <= 2) return;
  T.names.splice(ti, 1);
  T.wins.splice(ti, 1);
  renderStandings();
}

function confirmResetTour() {
  if (!confirm('¿Reiniciar todas las victorias?')) return;
  T.wins = T.wins.map(() => 0);
  T.hiddenPairs = new Set();
  renderStandings();
}

/* ══ TOURNEY RENAME (dinámico) ══ */
function openTourneyRename() {
  const container = document.getElementById('trename-fields');
  container.innerHTML = '';
  T.names.forEach((name, i) => {
    container.innerHTML += `
      <div class="modal-field" style="margin-bottom:0.8rem">
        <div class="modal-input-label">Pareja ${i+1}</div>
        <input class="modal-input" id="tr${i}" type="text" maxlength="18" value="${esc(name)}" autocomplete="off">
      </div>`;
  });
  document.getElementById('modal-trename').style.display = 'flex';
  setTimeout(() => document.getElementById('tr0').focus(), 100);
}
function closeTourneyRename() {
  document.getElementById('modal-trename').style.display = 'none';
}
function applyTourneyRename() {
  T.names.forEach((_, i) => {
    const val = document.getElementById('tr'+i).value.trim();
    if (val) T.names[i] = val;
  });
  closeTourneyRename();
  renderStandings();
}


/* ══ PLAY MATCH ══ */
function playMatch(a, b) {
  matchTourIdx = [a, b];
  s = mkState([T.names[a], T.names[b]]);
  hist = [];
  applyNames();
  show('game');
  render();
}

function goToStandings() {
  document.getElementById('overlay').style.display = 'none';
  show('standings');
  renderStandings();
}

/* ══ WINNER ACTIONS ══ */

function playAgain() {
  document.getElementById('overlay').style.display = 'none';
  s = mkState(s.names);
  hist = [];
  render();
}

/* ══ MATCH RENAME ══ */
function openRename() {
  document.getElementById('rn0').value = s.names[0];
  document.getElementById('rn1').value = s.names[1];
  document.getElementById('modal-rename').style.display = 'flex';
  setTimeout(() => document.getElementById('rn0').focus(), 100);
}
function closeRename() {
  document.getElementById('modal-rename').style.display = 'none';
}
function applyRename() {
  s.names[0] = document.getElementById('rn0').value.trim() || s.names[0];
  s.names[1] = document.getElementById('rn1').value.trim() || s.names[1];
  applyNames();
  closeRename();
}

function applyNames() {
  document.getElementById('gb-name0').textContent = s.names[0];
  document.getElementById('gb-name1').textContent = s.names[1];
  document.getElementById('lbl0').textContent = s.names[0].toUpperCase();
  document.getElementById('lbl1').textContent = s.names[1].toUpperCase();
}

/* ══ SCORING ══ */
function addPoint(t) {
  if (s.over) return;
  hist.push(JSON.parse(JSON.stringify(s)));
  if (hist.length > 60) hist.shift();
  const o = 1 - t;
  if (s.golden) {
    winGame(t);
  } else if (s.deuce) {
    if      (s.adv === t) winGame(t);      // tenía ADV, anota → gana
    else if (s.adv === o) { s.golden = true; s.adv = -1; } // igualaron ADV → punto de oro
    else                  s.adv = t;       // primer punto en deuce → ADV
  } else {
    if (s.pts[t] === 3 && s.pts[o] === 3) { s.deuce = true; }
    else if (s.pts[t] === 3)               { winGame(t); }
    else {
      s.pts[t]++;
      if (s.pts[t] === 3 && s.pts[o] === 3) s.deuce = true;
    }
  }
  render();
}

function winGame(t) {
  s.games[t]++;
  s.pts=[0,0]; s.deuce=false; s.adv=-1; s.golden=false;
  if (s.games[t] >= 2) {
    s.over=true; s.winner=t;
    const ti = matchTourIdx[t];
    if (ti >= 0) T.wins[ti]++;
    showWinner(t);
  }
}

function showWinner(t) {
  document.getElementById('ov-winner').textContent = s.names[t];
  document.getElementById('ov-sets').textContent   = s.games[0] + ' – ' + s.games[1] + ' juegos';
  document.getElementById('overlay').style.display = 'flex';
}

function undo() {
  if (!hist.length) return;
  s = hist.pop();
  document.getElementById('overlay').style.display = 'none';
  render();
}

function confirmReset() {
  if (!confirm('¿Reiniciar el partido?')) return;
  s=mkState(s.names); hist=[];
  document.getElementById('overlay').style.display='none';
  render();
}

/* ══ RENDER MATCH ══ */
function render() {
  for (let t = 0; t < 2; t++) {
    document.getElementById('tb'+t).style.display = 'none';
    let d;
    if      (s.golden)       d = '★';
    else if (s.deuce && s.adv === t)   d = 'ADV';
    else if (s.deuce && s.adv === 1-t) d = '—';
    else if (s.deuce)                  d = '40';
    else                               d = PTS[s.pts[t]];
    document.getElementById('pts'+t).textContent = d;
    document.getElementById('gb-games'+t).textContent = s.games[t];
  }
}

/* ══ PLAYERS ══ */
let PL = { pairs: [], firstA: 0, firstB: 1 };

function addPlayerInput(value) {
  const container = document.getElementById('player-inputs');
  const n = container.children.length + 1;
  const row = document.createElement('div');
  row.className = 'input-row';
  row.innerHTML = `
    <div class="input-group">
      <label>Jugador ${n}</label>
      <input type="text" class="player-input" placeholder="Nombre" maxlength="16" autocomplete="off">
    </div>
    <button class="btn-remove-input" onclick="removePlayerInput(this)">×</button>`;
  if (value) row.querySelector('.player-input').value = value;
  container.appendChild(row);
  updatePlayerRemoveButtons();
}

function removePlayerInput(btn) {
  const container = document.getElementById('player-inputs');
  if (container.children.length <= 4) return;
  btn.closest('.input-row').remove();
  Array.from(container.querySelectorAll('label')).forEach((lbl, i) => {
    lbl.textContent = 'Jugador ' + (i + 1);
  });
  updatePlayerRemoveButtons();
}

function updatePlayerRemoveButtons() {
  const container = document.getElementById('player-inputs');
  const show = container.children.length > 4;
  container.querySelectorAll('.btn-remove-input').forEach(b => {
    b.style.visibility = show ? 'visible' : 'hidden';
  });
}

function shufflePairs() {
  const inputs = document.querySelectorAll('.player-input');
  const names = Array.from(inputs).map((inp, i) => inp.value.trim() || 'Jugador ' + (i + 1));
  if (names.length % 2 !== 0) {
    alert('Necesitas un número par de jugadores para formar parejas.');
    return;
  }
  const sh = [...names];
  for (let i = sh.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [sh[i], sh[j]] = [sh[j], sh[i]];
  }
  PL.pairs = [];
  for (let i = 0; i < sh.length; i += 2) PL.pairs.push([sh[i], sh[i + 1]]);
  // pick first match randomly
  const idx = PL.pairs.map((_, i) => i);
  for (let i = idx.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [idx[i], idx[j]] = [idx[j], idx[i]];
  }
  PL.firstA = idx[0];
  PL.firstB = idx[1];
  renderAssignment();
}

function renderAssignment() {
  const container = document.getElementById('assignment-result');
  if (!PL.pairs.length) { container.innerHTML = ''; return; }
  const playing = new Set([PL.firstA, PL.firstB]);
  const waiting = PL.pairs.map((_, i) => i).filter(i => !playing.has(i));

  let html = `<div class="section-label" style="margin-bottom:0.2rem">Parejas asignadas</div>`;
  html += PL.pairs.map((pair, i) => `
    <div class="pair-card${playing.has(i) ? ' pair-active' : ''}">
      <div class="pair-label">Pareja ${i + 1}</div>
      <div class="pair-players">
        <span class="pair-player">${esc(pair[0])}</span>
        <span class="pair-amp">&amp;</span>
        <span class="pair-player">${esc(pair[1])}</span>
      </div>
    </div>`).join('');

  html += `
    <div class="first-match-box">
      <div class="first-match-header">⚡ Primer partido</div>
      <div class="first-match-vs">
        <div class="fm-team">
          <div class="fm-pair-num">Pareja ${PL.firstA + 1}</div>
          <div class="fm-names">${esc(PL.pairs[PL.firstA][0])}<br>${esc(PL.pairs[PL.firstA][1])}</div>
          <div class="fm-serve-badge">Saca primero</div>
        </div>
        <div class="fm-vs">VS</div>
        <div class="fm-team" style="text-align:right">
          <div class="fm-pair-num">Pareja ${PL.firstB + 1}</div>
          <div class="fm-names">${esc(PL.pairs[PL.firstB][0])}<br>${esc(PL.pairs[PL.firstB][1])}</div>
        </div>
      </div>
      ${waiting.length ? `<div class="fm-waiting">Esperan: ${waiting.map(i => 'Pareja ' + (i + 1) + ' (' + PL.pairs[i].join(' & ') + ')').join(' · ')}</div>` : ''}
    </div>`;

  container.innerHTML = html;
  document.getElementById('btn-start-players').style.display = 'block';
}

function startFromPlayers() {
  if (PL.pairs.length < 2) return;
  T.names = PL.pairs.map(p => p[0] + ' / ' + p[1]);
  T.wins = T.names.map(() => 0);
  T.hiddenPairs = new Set();
  show('standings');
  renderStandings();
}

function goToPlayers() {
  const container = document.getElementById('player-inputs');
  if (container.children.length === 0) {
    addPlayerInput(''); addPlayerInput(''); addPlayerInput(''); addPlayerInput('');
  }
  document.getElementById('assignment-result').innerHTML = '';
  document.getElementById('btn-start-players').style.display = 'none';
  PL.pairs = [];
  show('players');
}

function goToSetupFromPlayers() { show('setup'); }

/* ══ UTILS ══ */
function show(id) {
  ['setup','players','standings','game'].forEach(s =>
    document.getElementById(s).style.display = 'none'
  );
  const el = document.getElementById(id);
  if (el) el.style.display = 'flex';
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}


/* close modals on backdrop tap */
['modal-rename','modal-trename'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target===this) this.style.display='none';
  });
});

['rn0','rn1'].forEach(id =>
  document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') applyRename(); })
);
</script>
</body>
</html>
