<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PadelTime">
  <title>PadelTime</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: #080814;
      color: #fff;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      touch-action: manipulation;
      overflow: hidden;
    }

    /* ══ SETUP ══ */
    #setup {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      gap: 1.2rem;
      background: radial-gradient(ellipse at top, #1a1a3e 0%, #080814 70%);
    }

    .logo { font-size: 3rem; line-height: 1; }

    #setup h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #38bdf8, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle { color: #4a4a6a; font-size: 0.85rem; }

    .input-group { width: 100%; max-width: 300px; }

    .input-group label {
      display: block;
      margin-bottom: 0.35rem;
      color: #555;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
    }

    .input-group input {
      width: 100%;
      padding: 0.85rem 1rem;
      background: #12122a;
      border: 1.5px solid #2a2a4a;
      border-radius: 14px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      outline: none;
      transition: border-color .2s;
    }
    .input-group input:focus { border-color: #38bdf8; }
    .input-group input::placeholder { color: #2a2a4a; }

    .btn-start {
      background: linear-gradient(135deg, #38bdf8, #34d399);
      color: #000;
      border: none;
      padding: 1rem 2.5rem;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      margin-top: 0.3rem;
      box-shadow: 0 4px 24px rgba(56,189,248,.35);
      transition: transform .1s;
    }
    .btn-start:active { transform: scale(.96); }

    /* ══ STANDINGS ══ */
    #standings {
      display: none;
      flex-direction: column;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      background: radial-gradient(ellipse at top, #1a1a3e 0%, #080814 70%);
    }

    .st-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.2rem 0.6rem;
      border-bottom: 1px solid #1a1a30;
    }

    .st-topbar-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.1rem;
      font-weight: 800;
      background: linear-gradient(135deg, #38bdf8, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-icon {
      background: #1a1a30;
      border: none;
      color: #666;
      width: 36px; height: 36px;
      border-radius: 10px;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-icon:active { background: #252545; }

    .st-body {
      flex: 1;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
      overflow-y: auto;
      padding-bottom: max(1.2rem, env(safe-area-inset-bottom));
    }

    .section-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: #333;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
    }

    /* standings table */
    .st-table {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .st-row {
      display: flex;
      align-items: center;
      background: #0e0e24;
      border: 1px solid #1a1a30;
      border-radius: 14px;
      padding: 0.8rem 1rem;
      gap: 0.8rem;
      transition: border-color .2s;
    }
    .st-row.leader { border-color: #34d399; }

    .st-rank {
      font-size: 0.75rem;
      font-weight: 800;
      color: #333;
      width: 16px;
      text-align: center;
      flex-shrink: 0;
    }
    .st-row.leader .st-rank { color: #34d399; }

    .st-name {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 700;
      color: #ccc;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .st-row.leader .st-name { color: #fff; }

    .st-wins {
      font-size: 1.6rem;
      font-weight: 900;
      color: #e0e0e0;
      min-width: 32px;
      text-align: center;
    }
    .st-row.leader .st-wins { color: #34d399; }

    .st-win-label {
      font-size: 0.6rem;
      color: #333;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 0.15rem;
    }

    .st-counter {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
    }

    .st-btns {
      display: flex;
      gap: 0.4rem;
    }

    .btn-win {
      width: 38px; height: 38px;
      border-radius: 10px;
      border: none;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .1s;
    }
    .btn-win:active { transform: scale(.9); }
    .btn-win.plus  { background: #1a3a2a; color: #34d399; }
    .btn-win.minus { background: #1a1a30; color: #444; }
    .btn-win.minus:active { color: #888; }

    /* matchup buttons */
    .st-matches {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .btn-matchup {
      background: #0e0e24;
      border: 1px solid #2a2a4a;
      border-radius: 14px;
      color: #aaa;
      padding: 0.9rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      transition: border-color .15s, color .15s;
    }
    .btn-matchup:active { border-color: #38bdf8; color: #fff; }
    .btn-matchup-icon { font-size: 1rem; flex-shrink: 0; }

    .btn-reset-tour {
      background: none;
      border: 1px solid #1a1a30;
      border-radius: 12px;
      color: #333;
      padding: 0.7rem;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    .btn-reset-tour:active { color: #888; border-color: #333; }

    /* ══ GAME ══ */
    #game {
      display: none;
      flex-direction: column;
      height: 100vh;
      height: -webkit-fill-available;
    }

    .scoreboard {
      background: #0c0c20;
      padding: 0.7rem 1rem 0.5rem;
      border-bottom: 1px solid #1a1a30;
    }

    .sb-table { display: flex; flex-direction: column; }

    .sb-hrow {
      display: flex;
      align-items: center;
      height: 22px;
      border-bottom: 1px solid #1a1a30;
      margin-bottom: 0.1rem;
    }

    .sb-row { display: flex; align-items: center; height: 36px; }

    .col-name  { flex: 1; min-width: 0; padding-left: 0.2rem; }
    .col-set   { width: 38px; text-align: center; flex-shrink: 0; }
    .col-games { width: 46px; text-align: center; flex-shrink: 0; }

    .sb-hcell {
      font-size: 0.6rem; font-weight: 700;
      color: #333; text-transform: uppercase; letter-spacing: 0.1em;
    }

    .sb-name-cell {
      font-size: 0.82rem; font-weight: 700; color: #aaa;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      cursor: pointer; display: flex; align-items: center; gap: 0.3rem;
    }
    .sb-name-cell:active { color: #38bdf8; }
    .sb-edit-icon { font-size: 0.6rem; color: #2a2a4a; flex-shrink: 0; }

    .sb-set {
      font-size: 1rem; font-weight: 800; color: #2a2a4a; transition: color .2s;
    }
    .sb-set.played { color: #666; }
    .sb-set.won    { color: #34d399; }
    .sb-set.active { color: #e0e0e0; }

    .sb-games { font-size: 1.5rem; font-weight: 900; color: #e0e0e0; }

    .set-label {
      font-size: 0.6rem; color: #333;
      text-transform: uppercase; letter-spacing: 0.1em;
      text-align: right; padding-top: 0.25rem; font-weight: 600;
    }

    .tb-badge {
      font-size: 0.6rem; font-weight: 800;
      color: #ef4444; letter-spacing: 0.08em;
      padding: .12rem .35rem;
      border: 1px solid #ef4444; border-radius: 4px;
    }

    .court { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .team-card {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.25rem;
      cursor: pointer; user-select: none;
      transition: background .08s;
    }
    .team-card:active { background: rgba(255,255,255,.04); }
    .team-card.t0 { background: linear-gradient(180deg, #0c0c20 0%, #080814 100%); }
    .team-card.t1 { background: linear-gradient(180deg, #080814 0%, #0c0c20 100%); }

    .court-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #2a2a4a, transparent);
      flex-shrink: 0;
    }

    .card-label {
      font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .t0 .card-label { color: #38bdf8; }
    .t1 .card-label { color: #f87171; }

    .card-points {
      font-size: 6rem; font-weight: 900;
      line-height: 1; letter-spacing: -0.04em;
    }
    .t0 .card-points { color: #38bdf8; }
    .t1 .card-points { color: #f87171; }

    .card-tb {
      display: none;
      background: #ef4444; color: #fff;
      font-size: 0.65rem; font-weight: 800;
      letter-spacing: 0.1em;
      padding: .2rem .5rem; border-radius: 4px;
    }

    .controls {
      display: flex; gap: 0.5rem;
      padding: 0.75rem 1rem;
      background: #0c0c20;
      border-top: 1px solid #1a1a30;
      padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
    }

    .btn-ctrl {
      flex: 1;
      background: #1a1a30; border: none;
      color: #888;
      padding: 0.7rem 0.2rem;
      border-radius: 10px;
      font-size: 0.75rem; font-weight: 600;
      cursor: pointer; white-space: nowrap;
      transition: background .1s, color .1s;
    }
    .btn-ctrl:active { background: #252545; color: #ccc; }
    .btn-ctrl.back { color: #38bdf8; }

    /* ══ MODALS ══ */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(4,4,16,.92);
      flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 60;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: 2rem;
    }

    .modal-box {
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      padding: 1.6rem 1.4rem;
      width: 100%; max-width: 320px;
      display: flex; flex-direction: column; gap: 1rem;
    }

    .modal-title { font-size: 1rem; font-weight: 800; color: #ccc; }

    .modal-field { display: flex; flex-direction: column; }

    .modal-input-label {
      font-size: 0.7rem; color: #444;
      text-transform: uppercase; letter-spacing: 0.1em;
      font-weight: 600; margin-bottom: 0.3rem;
    }

    .modal-input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: #0c0c20;
      border: 1.5px solid #2a2a4a; border-radius: 12px;
      color: #fff; font-size: 0.95rem; font-weight: 600;
      outline: none; transition: border-color .2s;
    }
    .modal-input:focus { border-color: #38bdf8; }
    .modal-input::placeholder { color: #2a2a4a; }

    .modal-actions { display: flex; gap: 0.6rem; }

    .btn-modal-cancel {
      flex: 1; background: #1a1a30; border: none;
      color: #666; padding: 0.8rem; border-radius: 12px;
      font-size: 0.85rem; font-weight: 700; cursor: pointer;
    }
    .btn-modal-cancel:active { opacity: .7; }

    .btn-modal-ok {
      flex: 2;
      background: linear-gradient(135deg, #38bdf8, #34d399);
      border: none; color: #000;
      padding: 0.8rem; border-radius: 12px;
      font-size: 0.85rem; font-weight: 800; cursor: pointer;
    }
    .btn-modal-ok:active { opacity: .85; }

    /* ══ WINNER ══ */
    #overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(4,4,16,.95);
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1rem; z-index: 50;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .ov-trophy { font-size: 5rem; line-height: 1; animation: pop .6s ease; }

    @keyframes pop {
      0%   { transform: scale(.3); opacity: 0; }
      70%  { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }

    .ov-title {
      font-size: .8rem; font-weight: 700;
      letter-spacing: .15em; text-transform: uppercase; color: #555;
    }

    #ov-winner {
      font-size: 2.2rem; font-weight: 900;
      letter-spacing: -.02em;
      background: linear-gradient(135deg, #fbbf24, #f87171);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center; padding: 0 1.5rem;
    }

    .ov-sets { font-size: .85rem; color: #444; font-weight: 600; }

    .ov-actions {
      display: flex; flex-direction: column;
      align-items: center; gap: 0.6rem;
      margin-top: 0.5rem; width: 100%; padding: 0 2rem;
    }

    .btn-award {
      background: linear-gradient(135deg, #34d399, #38bdf8);
      color: #000; border: none;
      padding: .85rem 2rem; border-radius: 50px;
      font-size: .9rem; font-weight: 800; cursor: pointer;
      width: 100%; max-width: 280px;
      box-shadow: 0 4px 20px rgba(52,211,153,.3);
    }
    .btn-award:active { opacity: .85; }

    .btn-new {
      background: #1a1a30;
      color: #666; border: none;
      padding: .75rem 2rem; border-radius: 50px;
      font-size: .85rem; font-weight: 700; cursor: pointer;
      width: 100%; max-width: 280px;
    }
    .btn-new:active { color: #aaa; }

    .btn-back-standings {
      background: none; border: none;
      color: #38bdf8; font-size: .8rem; font-weight: 600;
      cursor: pointer; padding: 0.3rem;
    }
  </style>
</head>
<body>

<!-- ══ SETUP ══ -->
<div id="setup">
  <div class="logo">🎾</div>
  <h1>PadelTime</h1>
  <p class="subtitle">Torneo de 3 parejas</p>

  <div class="input-group">
    <label>Pareja 1</label>
    <input type="text" id="t1" placeholder="Los Tigres" maxlength="18" autocomplete="off">
  </div>
  <div class="input-group">
    <label>Pareja 2</label>
    <input type="text" id="t2" placeholder="Las Panteras" maxlength="18" autocomplete="off">
  </div>
  <div class="input-group">
    <label>Pareja 3</label>
    <input type="text" id="t3" placeholder="Los Osos" maxlength="18" autocomplete="off">
  </div>

  <button class="btn-start" onclick="startTourney()">Empezar Torneo</button>
</div>

<!-- ══ STANDINGS ══ -->
<div id="standings">
  <div class="st-topbar">
    <div class="st-topbar-title">🎾 PadelTime</div>
    <button class="btn-icon" onclick="openTourneyRename()" title="Renombrar equipos">✏️</button>
  </div>

  <div class="st-body">
    <div>
      <div class="section-label">Posiciones</div>
      <div class="st-table" id="st-table"></div>
    </div>

    <div>
      <div class="section-label">Jugar partido</div>
      <div class="st-matches" id="st-matches"></div>
    </div>

    <button class="btn-reset-tour" onclick="confirmResetTour()">↺ Reiniciar torneo</button>
  </div>
</div>

<!-- ══ GAME ══ -->
<div id="game">
  <div class="scoreboard">
    <div class="sb-table">
      <div class="sb-hrow">
        <div class="col-name"></div>
        <div class="col-set  sb-hcell">S1</div>
        <div class="col-set  sb-hcell">S2</div>
        <div class="col-set  sb-hcell">S3</div>
        <div class="col-games sb-hcell">JUE</div>
      </div>
      <div class="sb-row">
        <div class="col-name">
          <div class="sb-name-cell" id="sb0" onclick="openRename()">
            <span class="sb-edit-icon">✏️</span>
            <span id="sb0-txt"></span>
          </div>
        </div>
        <div class="col-set  sb-set" id="sc0-0">-</div>
        <div class="col-set  sb-set" id="sc0-1">-</div>
        <div class="col-set  sb-set" id="sc0-2">-</div>
        <div class="col-games sb-games" id="sg0">0</div>
      </div>
      <div class="sb-row">
        <div class="col-name">
          <div class="sb-name-cell" id="sb1" onclick="openRename()">
            <span class="sb-edit-icon">✏️</span>
            <span id="sb1-txt"></span>
          </div>
        </div>
        <div class="col-set  sb-set" id="sc1-0">-</div>
        <div class="col-set  sb-set" id="sc1-1">-</div>
        <div class="col-set  sb-set" id="sc1-2">-</div>
        <div class="col-games sb-games" id="sg1">0</div>
      </div>
    </div>
    <div class="set-label" id="set-label">Set 1</div>
  </div>

  <div class="court">
    <div class="team-card t0" onclick="addPoint(0)">
      <div class="card-tb" id="tb0">TIEBREAK</div>
      <div class="card-label" id="lbl0">PAREJA 1</div>
      <div class="card-points" id="pts0">0</div>
    </div>
    <div class="court-divider"></div>
    <div class="team-card t1" onclick="addPoint(1)">
      <div class="card-tb" id="tb1">TIEBREAK</div>
      <div class="card-label" id="lbl1">PAREJA 2</div>
      <div class="card-points" id="pts1">0</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-ctrl back" onclick="goToStandings()">← Pos.</button>
    <button class="btn-ctrl" onclick="undo()">↩ Deshacer</button>
    <button class="btn-ctrl" onclick="openRename()">✏️ Editar</button>
    <button class="btn-ctrl" onclick="confirmReset()">↺ Reset</button>
  </div>
</div>

<!-- RENAME MATCH MODAL -->
<div class="modal-backdrop" id="modal-rename">
  <div class="modal-box">
    <div class="modal-title">Cambiar nombres</div>
    <div class="modal-field">
      <div class="modal-input-label">Pareja 1</div>
      <input class="modal-input" id="rn0" type="text" maxlength="18" autocomplete="off">
    </div>
    <div class="modal-field">
      <div class="modal-input-label">Pareja 2</div>
      <input class="modal-input" id="rn1" type="text" maxlength="18" autocomplete="off">
    </div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeRename()">Cancelar</button>
      <button class="btn-modal-ok" onclick="applyRename()">Guardar</button>
    </div>
  </div>
</div>

<!-- RENAME TOURNEY MODAL -->
<div class="modal-backdrop" id="modal-trename">
  <div class="modal-box">
    <div class="modal-title">Renombrar parejas</div>
    <div class="modal-field">
      <div class="modal-input-label">Pareja 1</div>
      <input class="modal-input" id="tr0" type="text" maxlength="18" autocomplete="off">
    </div>
    <div class="modal-field">
      <div class="modal-input-label">Pareja 2</div>
      <input class="modal-input" id="tr1" type="text" maxlength="18" autocomplete="off">
    </div>
    <div class="modal-field">
      <div class="modal-input-label">Pareja 3</div>
      <input class="modal-input" id="tr2" type="text" maxlength="18" autocomplete="off">
    </div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeTourneyRename()">Cancelar</button>
      <button class="btn-modal-ok" onclick="applyTourneyRename()">Guardar</button>
    </div>
  </div>
</div>

<!-- WINNER -->
<div id="overlay">
  <div class="ov-trophy">🏆</div>
  <div class="ov-title">¡Ganador del partido!</div>
  <div id="ov-winner"></div>
  <div class="ov-sets" id="ov-sets"></div>
  <div class="ov-actions">
    <button class="btn-award" id="btn-award" onclick="awardAndReturn()">+ Victoria en posiciones</button>
    <button class="btn-new" onclick="playAgain()">Repetir partido</button>
    <button class="btn-back-standings" onclick="goToStandings()">Volver sin anotar</button>
  </div>
</div>

<script>
'use strict';

/* ══ TOURNEY STATE ══ */
let T = { names: ['','',''], wins: [0,0,0] };
let matchTourIdx = [-1, -1]; // which tourney indices are playing

/* ══ MATCH STATE ══ */
const PTS = ['0','15','30','40'];
let s = {}, hist = [];

function mkState(names) {
  return {
    names,
    sets: [], setsWon: [0,0],
    games: [0,0], pts: [0,0],
    deuce: false, adv: -1,
    tb: false, tbPts: [0,0],
    over: false, winner: -1
  };
}

/* ══ SETUP → STANDINGS ══ */
function startTourney() {
  T.names[0] = document.getElementById('t1').value.trim() || 'Pareja 1';
  T.names[1] = document.getElementById('t2').value.trim() || 'Pareja 2';
  T.names[2] = document.getElementById('t3').value.trim() || 'Pareja 3';
  T.wins = [0, 0, 0];
  show('standings');
  renderStandings();
}

/* ══ STANDINGS ══ */
function renderStandings() {
  // sort by wins desc, keep original index
  const order = [0,1,2].sort((a,b) => T.wins[b] - T.wins[a]);

  const tbl = document.getElementById('st-table');
  tbl.innerHTML = '';
  order.forEach((ti, rank) => {
    const isLeader = rank === 0 && T.wins[ti] > 0;
    const row = document.createElement('div');
    row.className = 'st-row' + (isLeader ? ' leader' : '');
    row.innerHTML = `
      <div class="st-rank">${rank+1}</div>
      <div class="st-name">${esc(T.names[ti])}</div>
      <div class="st-counter">
        <div class="st-wins">${T.wins[ti]}</div>
        <div class="st-win-label">victorias</div>
      </div>
      <div class="st-btns">
        <button class="btn-win minus" onclick="changeWin(${ti},-1)">−</button>
        <button class="btn-win plus"  onclick="changeWin(${ti}, 1)">+</button>
      </div>`;
    tbl.appendChild(row);
  });

  // matchup buttons
  const pairs = [[0,1],[0,2],[1,2]];
  const mtch = document.getElementById('st-matches');
  mtch.innerHTML = '';
  pairs.forEach(([a,b]) => {
    const btn = document.createElement('button');
    btn.className = 'btn-matchup';
    btn.innerHTML = `<span class="btn-matchup-icon">🎾</span>${esc(T.names[a])} vs ${esc(T.names[b])}`;
    btn.onclick = () => playMatch(a, b);
    mtch.appendChild(btn);
  });
}

function changeWin(ti, delta) {
  T.wins[ti] = Math.max(0, T.wins[ti] + delta);
  renderStandings();
}

function confirmResetTour() {
  if (!confirm('¿Reiniciar todas las victorias?')) return;
  T.wins = [0,0,0];
  renderStandings();
}

/* ══ TOURNEY RENAME ══ */
function openTourneyRename() {
  for (let i = 0; i < 3; i++)
    document.getElementById('tr'+i).value = T.names[i];
  document.getElementById('modal-trename').style.display = 'flex';
  setTimeout(() => document.getElementById('tr0').focus(), 100);
}
function closeTourneyRename() {
  document.getElementById('modal-trename').style.display = 'none';
}
function applyTourneyRename() {
  for (let i = 0; i < 3; i++)
    T.names[i] = document.getElementById('tr'+i).value.trim() || T.names[i];
  closeTourneyRename();
  renderStandings();
}

/* ══ PLAY MATCH ══ */
function playMatch(a, b) {
  matchTourIdx = [a, b];
  s = mkState([T.names[a], T.names[b]]);
  hist = [];
  resetSetCells();
  applyNames();
  show('game');
  render();
}

function goToStandings() {
  document.getElementById('overlay').style.display = 'none';
  show('standings');
  renderStandings();
}

/* ══ WINNER ACTIONS ══ */
function awardAndReturn() {
  if (s.winner >= 0 && matchTourIdx[s.winner] >= 0) {
    T.wins[matchTourIdx[s.winner]]++;
  }
  goToStandings();
}

function playAgain() {
  document.getElementById('overlay').style.display = 'none';
  s = mkState(s.names);
  hist = [];
  resetSetCells();
  render();
}

/* ══ MATCH RENAME ══ */
function openRename() {
  document.getElementById('rn0').value = s.names[0];
  document.getElementById('rn1').value = s.names[1];
  document.getElementById('modal-rename').style.display = 'flex';
  setTimeout(() => document.getElementById('rn0').focus(), 100);
}
function closeRename() {
  document.getElementById('modal-rename').style.display = 'none';
}
function applyRename() {
  s.names[0] = document.getElementById('rn0').value.trim() || s.names[0];
  s.names[1] = document.getElementById('rn1').value.trim() || s.names[1];
  applyNames();
  closeRename();
}

function applyNames() {
  document.getElementById('sb0-txt').textContent = s.names[0];
  document.getElementById('sb1-txt').textContent = s.names[1];
  document.getElementById('lbl0').textContent    = s.names[0].toUpperCase();
  document.getElementById('lbl1').textContent    = s.names[1].toUpperCase();
}

/* ══ SCORING ══ */
function addPoint(t) {
  if (s.over) return;
  hist.push(JSON.parse(JSON.stringify(s)));
  if (hist.length > 60) hist.shift();
  const o = 1 - t;
  if (s.tb) {
    s.tbPts[t]++;
    if (s.tbPts[t] >= 7 && s.tbPts[t] - s.tbPts[o] >= 2) winGame(t);
  } else if (s.deuce) {
    if      (s.adv === t) winGame(t);
    else if (s.adv === o) s.adv = -1;
    else                  s.adv = t;
  } else {
    if (s.pts[t] === 3 && s.pts[o] === 3) { s.deuce = true; }
    else if (s.pts[t] === 3)               { winGame(t); }
    else {
      s.pts[t]++;
      if (s.pts[t] === 3 && s.pts[o] === 3) s.deuce = true;
    }
  }
  render();
}

function winGame(t) {
  const o = 1 - t;
  s.games[t]++;
  s.pts=[0,0]; s.deuce=false; s.adv=-1; s.tb=false; s.tbPts=[0,0];
  const g=s.games[t], go=s.games[o];
  if (g===7||(g>=6&&g-go>=2)) winSet(t);
  else if (g===6&&go===6)     s.tb=true;
}

function winSet(t) {
  s.sets.push({g:[s.games[0],s.games[1]]});
  s.setsWon[t]++;
  s.games=[0,0];
  if (s.setsWon[t]===2) { s.over=true; s.winner=t; showWinner(t); }
  render();
}

function showWinner(t) {
  document.getElementById('ov-winner').textContent = s.names[t];
  document.getElementById('ov-sets').textContent   = s.sets.map(st=>st.g[0]+'-'+st.g[1]).join('  ');
  // update award button label
  document.getElementById('btn-award').textContent = '+ Victoria para ' + s.names[t];
  document.getElementById('overlay').style.display = 'flex';
}

function undo() {
  if (!hist.length) return;
  s = hist.pop();
  document.getElementById('overlay').style.display = 'none';
  render();
}

function confirmReset() {
  if (!confirm('¿Reiniciar el partido?')) return;
  s=mkState(s.names); hist=[];
  document.getElementById('overlay').style.display='none';
  resetSetCells();
  render();
}

/* ══ RENDER MATCH ══ */
function render() {
  for (let t=0;t<2;t++) {
    let d;
    if (s.tb) {
      d=s.tbPts[t].toString();
      document.getElementById('tb'+t).style.display='block';
    } else {
      document.getElementById('tb'+t).style.display='none';
      if (s.deuce) d=s.adv===t?'ADV':s.adv===1-t?'—':'40';
      else         d=PTS[s.pts[t]];
    }
    document.getElementById('pts'+t).textContent=d;
    document.getElementById('sg'+t).textContent=s.games[t];
  }
  const cur=s.sets.length;
  for (let t=0;t<2;t++) {
    for (let i=0;i<3;i++) {
      const cell=document.getElementById('sc'+t+'-'+i);
      if (i<s.sets.length) {
        const g=s.sets[i].g[t], go=s.sets[i].g[1-t];
        cell.textContent=g;
        cell.className='col-set sb-set '+(g>go?'won':'played');
      } else if (i===cur) {
        cell.textContent='-'; cell.className='col-set sb-set active';
      } else {
        cell.textContent='-'; cell.className='col-set sb-set';
      }
    }
  }
  const n=s.sets.length+1;
  document.getElementById('set-label').innerHTML=
    'Set '+n+(s.tb?' &nbsp;·&nbsp; <span class="tb-badge">TIEBREAK</span>':'');
}

function resetSetCells() {
  for (let t=0;t<2;t++)
    for (let i=0;i<3;i++) {
      const c=document.getElementById('sc'+t+'-'+i);
      c.textContent='-'; c.className='col-set sb-set';
    }
}

/* ══ UTILS ══ */
function show(id) {
  ['setup','standings','game'].forEach(s =>
    document.getElementById(s).style.display = s===id ? (id==='standings'?'flex':'flex') : 'none'
  );
  if (id==='standings') document.getElementById('standings').style.display='flex';
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* close modals on backdrop tap */
['modal-rename','modal-trename'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target===this) this.style.display='none';
  });
});

['rn0','rn1'].forEach(id =>
  document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') applyRename(); })
);
['tr0','tr1','tr2'].forEach(id =>
  document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') applyTourneyRename(); })
);
</script>
